<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #111;
      line-height: 1.6;
      background: #f5f5f5;
    }

    /* ===== Header ===== */
    header {
      background: #000;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .name {
      font-weight: 600;
      color: #fff;
    }

    nav a {
      margin-left: 16px;
      text-decoration: none;
      color: #eaeaea;
      font-size: 0.95rem;
    }

    nav a:hover {
      text-decoration: underline;
      color: #ffffff;
    }

    /* ===== Sections ===== */
    section {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
      font-size: 1.25rem;
    }

    /* ===== Intro ===== */
    .intro p {
      margin-top: 0;
      margin-bottom: 12px;
      text-align: justify;
      text-justify: inter-word;
      hyphens: auto;
    }

    /* ===== Posts ===== */
    .posts {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .posts li {
      margin-bottom: 14px;
    }

    .posts .date {
      font-family: monospace;
      color: #666;
      margin-right: 10px;
    }

    .posts a {
      color: #111;
      text-decoration: none;
    }

    .posts a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <a href="https://gabjp.github.io/" class="name">Gabriel Jacob Perin</a>
    <nav>
      <a href="#about">About</a>
      <a href="#posts">Posts</a>
    </nav>
  </div>
</header>

<section id="about">
  <h2>Course Blog</h2>
  <div class="intro">
    <p>
      This blog contains posts written for a course. Each entry is available as a separate page.
    </p>
  </div>
</section>

<section id="posts">
  <h2>Posts</h2>
  <ul class="posts">
    <li>
      <span class="date">2026-04-01</span>
      <a href="posts/post3.html">Post 3 Title</a>
    </li>
    <li>
      <span class="date">2026-03-25</span>
      <a href="posts/post2.html">Post 2 Title</a>
    </li>
    <li>
      <span class="date">2026-03-18</span>
      <a href="posts/post1.html">Post 1 Title</a>
    </li>
  </ul>
</section>

</body>
</html>
